<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRM Mobile Login & Onboarding</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="prototype-shell">
      <header class="prototype-header">
        <div>
          <span class="badge">Mobile CRM · Screen 1</span>
          <h1 style="margin-top: 8px">Login & Onboarding</h1>
        </div>
        <a class="button secondary" href="./crm-mobile-prototype.html" style="text-decoration: none">Mobile index</a>
      </header>

      <div class="mobile-wrap">
        <div class="mobile-screen">
          <header class="mobile-topbar">
            <p class="mini">Beauty-Time CRM</p>
            <h2 style="font-size: 24px; margin-top: 4px">Sign in from phone</h2>
          </header>

          <main class="mobile-content">
            <section class="mobile-card">
              <strong>Login</strong>
              <div class="form-grid" style="margin-top: 8px">
                <input class="input" placeholder="owner@studio.de" />
                <input class="input" type="password" placeholder="••••••••" />
                <button class="button primary">Sign in</button>
              </div>
            </section>

            <section class="mobile-card">
              <strong>Quick onboarding</strong>
              <div class="form-grid" style="margin-top: 8px">
                <input class="input" value="Beauty Studio Berlin Mitte" />
                <select class="select"><option>Solo master</option><option>Salon</option></select>
                <select class="select"><option>Europe/Berlin</option></select>
                <button class="button secondary">Create workspace</button>
              </div>
            </section>
          </main>

          <nav class="mobile-nav">
            <a class="mobile-nav-item active" href="./crm-mobile-login-onboarding.html">Login</a>
            <a class="mobile-nav-item" href="./crm-mobile-dashboard.html">Today</a>
            <a class="mobile-nav-item" href="./crm-mobile-calendar.html">Calendar</a>
            <a class="mobile-nav-item" href="./crm-mobile-settings.html">More</a>
          </nav>
        </div>
      </div>
    </div>
  </body>
</html>
