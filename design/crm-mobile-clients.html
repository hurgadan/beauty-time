<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRM Mobile Clients</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="prototype-shell">
      <header class="prototype-header">
        <div>
          <span class="badge">Mobile CRM · Screen 5</span>
          <h1 style="margin-top: 8px">Clients</h1>
        </div>
        <a class="button secondary" href="./crm-mobile-prototype.html" style="text-decoration: none">Mobile index</a>
      </header>

      <div class="mobile-wrap">
        <div class="mobile-screen">
          <header class="mobile-topbar">
            <p class="mini">Clients</p>
            <h2 style="font-size: 24px; margin-top: 4px">Card and history</h2>
          </header>

          <main class="mobile-content">
            <section class="mobile-card">
              <div class="split"><strong>Sofia Ludwig</strong><span class="badge success">Returning</span></div>
              <p class="mini muted" style="margin-top: 4px">sofia@example.de · +49 152 3322 4411</p>
            </section>
            <section class="mobile-card">
              <strong>Visit history</strong>
              <div class="list" style="margin-top: 8px">
                <div class="list-item"><strong>20 Feb · Pedicure</strong><p class="mini muted">Completed · €42</p></div>
                <div class="list-item"><strong>18 Jan · Manicure</strong><p class="mini muted">Completed · €55</p></div>
                <div class="list-item"><strong>22 Dec · Pedicure</strong><p class="mini muted">No-show</p></div>
              </div>
            </section>
            <section class="mobile-card">
              <div style="display:flex; gap:8px">
                <button class="button secondary" style="padding: 10px 12px">Export GDPR</button>
                <button class="button ghost" style="padding: 10px 12px">Delete request</button>
              </div>
            </section>
          </main>

          <nav class="mobile-nav">
            <a class="mobile-nav-item" href="./crm-mobile-dashboard.html">Today</a>
            <a class="mobile-nav-item" href="./crm-mobile-calendar.html">Calendar</a>
            <a class="mobile-nav-item active" href="./crm-mobile-clients.html">Clients</a>
            <a class="mobile-nav-item" href="./crm-mobile-settings.html">More</a>
          </nav>
        </div>
      </div>
    </div>
  </body>
</html>
