<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Booking Step 2 - Service</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <section class="booking-layout">
      <main>
        <section class="card booking-form" style="margin-top: 0">
          <span class="badge">Step 2/8</span>
          <h2 style="font-size: 30px; margin-top: 8px">Choose service</h2>
          <p class="muted" style="margin-top: 4px">Duration and price are shown before booking.</p>
          <div class="list" style="margin-top: 14px">
            <div class="list-item"><strong>Haircut + styling</strong><p class="muted">45 min · €49</p></div>
            <div class="list-item" style="border-color: rgba(15,118,110,0.4); background: rgba(15,118,110,0.08)"><strong>Manicure premium</strong><p class="muted">60 min · €55</p></div>
            <div class="list-item"><strong>Pedicure classic</strong><p class="muted">45 min · €42</p></div>
          </div>
          <div style="display:flex; gap:10px; margin-top:16px">
            <a class="button secondary" href="./booking-step-01-landing.html" style="text-decoration:none">Back</a>
            <a class="button primary" href="./booking-step-03-specialist.html" style="text-decoration:none">Continue</a>
          </div>
        </section>
      </main>
      <aside class="phone-mock">
        <div class="phone-screen">
          <header class="phone-top"><h3 style="font-size:22px">Service selected</h3></header>
          <section class="phone-section"><strong>Manicure premium</strong><p class="mini muted">60 min · Buffer included</p></section>
        </div>
      </aside>
    </section>
  </body>
</html>
