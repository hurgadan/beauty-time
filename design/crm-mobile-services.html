<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRM Mobile Services</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="prototype-shell">
      <header class="prototype-header">
        <div>
          <span class="badge">Mobile CRM · Screen 6</span>
          <h1 style="margin-top: 8px">Services</h1>
        </div>
        <a class="button secondary" href="./crm-mobile-prototype.html" style="text-decoration: none">Mobile index</a>
      </header>

      <div class="mobile-wrap">
        <div class="mobile-screen">
          <header class="mobile-topbar">
            <p class="mini">Services</p>
            <h2 style="font-size: 24px; margin-top: 4px">Price, duration, buffer</h2>
          </header>

          <main class="mobile-content">
            <section class="mobile-card">
              <strong>Service list</strong>
              <div class="list" style="margin-top: 8px">
                <div class="list-item"><strong>Haircut + Styling</strong><p class="mini muted">45m · €49 · buffer 10m</p></div>
                <div class="list-item"><strong>Manicure Premium</strong><p class="mini muted">60m · €55 · buffer 10m</p></div>
                <div class="list-item"><strong>Pedicure Classic</strong><p class="mini muted">45m · €42 · buffer 10m</p></div>
              </div>
            </section>
            <section class="mobile-card">
              <strong>Edit selected service</strong>
              <div class="form-grid" style="margin-top: 8px">
                <input class="input" value="Manicure Premium" />
                <div class="form-grid two">
                  <input class="input" value="60 min" />
                  <input class="input" value="€55" />
                </div>
                <button class="button primary">Save service</button>
              </div>
            </section>
          </main>

          <nav class="mobile-nav">
            <a class="mobile-nav-item" href="./crm-mobile-dashboard.html">Today</a>
            <a class="mobile-nav-item" href="./crm-mobile-calendar.html">Calendar</a>
            <a class="mobile-nav-item" href="./crm-mobile-clients.html">Clients</a>
            <a class="mobile-nav-item active" href="./crm-mobile-services.html">Services</a>
          </nav>
        </div>
      </div>
    </div>
  </body>
</html>
