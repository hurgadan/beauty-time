<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Booking Edge - OTP Expired</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <section class="booking-layout">
      <main>
        <section class="card booking-form" style="margin-top: 0">
          <span class="badge warning">Edge case</span>
          <h2 style="font-size: 30px; margin-top: 8px">OTP expired</h2>
          <p class="muted" style="margin-top: 4px">For security reasons, verification code is time-limited.</p>
          <div class="state-block error">Your code has expired. Request a new one to continue.</div>
          <div style="display:flex; gap:10px; margin-top:16px">
            <button class="button primary">Resend OTP</button>
            <a class="button secondary" href="./booking-step-06-otp.html" style="text-decoration:none">Back to OTP screen</a>
          </div>
        </section>
      </main>
      <aside class="phone-mock">
        <div class="phone-screen">
          <header class="phone-top"><h3 style="font-size:22px">Code expired</h3></header>
          <section class="phone-section"><p class="mini">Show cooldown and remaining attempts.</p></section>
        </div>
      </aside>
    </section>
  </body>
</html>
