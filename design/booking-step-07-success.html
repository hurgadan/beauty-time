<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Booking Step 7 - Success</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <section class="booking-layout">
      <main>
        <section class="card booking-form" style="margin-top: 0">
          <span class="badge success">Step 7/8</span>
          <h2 style="font-size: 30px; margin-top: 8px">Appointment confirmed</h2>
          <p class="muted" style="margin-top: 4px">Fri, 27 Feb 2026 at 10:00 · Manicure Premium</p>
          <div class="state-block success">You will receive reminder emails at T-24h and T-2h.</div>
          <div class="list" style="margin-top: 12px">
            <div class="list-item"><strong>Add to calendar</strong><p class="muted">Google / Apple / Outlook</p></div>
            <div class="list-item"><strong>Reschedule policy</strong><p class="muted">Up to 12h before visit</p></div>
          </div>
          <div style="display:flex; gap:10px; margin-top:16px">
            <button class="button secondary">Add to calendar</button>
            <a class="button primary" href="./booking-step-08-reminder-confirm.html" style="text-decoration:none">Preview reminder confirmation</a>
          </div>
        </section>
      </main>
      <aside class="phone-mock">
        <div class="phone-screen">
          <header class="phone-top"><h3 style="font-size:22px">Done</h3></header>
          <section class="phone-section"><p class="mini">Booking completed in 1m 31s.</p></section>
        </div>
      </aside>
    </section>
  </body>
</html>
