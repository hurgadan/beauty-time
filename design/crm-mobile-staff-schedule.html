<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRM Mobile Staff & Schedule</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="prototype-shell">
      <header class="prototype-header">
        <div>
          <span class="badge">Mobile CRM · Staff</span>
          <h1 style="margin-top: 8px">Staff & schedule</h1>
        </div>
        <a class="button secondary" href="./crm-mobile-prototype.html" style="text-decoration: none">Mobile index</a>
      </header>

      <div class="mobile-wrap">
        <div class="mobile-screen">
          <header class="mobile-topbar">
            <p class="mini">Staff</p>
            <h2 style="font-size: 24px; margin-top: 4px">Team and working hours</h2>
          </header>

          <main class="mobile-content">
            <section class="mobile-card">
              <strong>Team</strong>
              <div class="list" style="margin-top: 8px">
                <div class="list-item"><strong>Mila</strong><p class="mini muted">staff · Hair · active</p></div>
                <div class="list-item"><strong>Anna</strong><p class="mini muted">staff · Nails · active</p></div>
                <div class="list-item"><strong>Rami</strong><p class="mini muted">staff · Massage · on leave</p></div>
              </div>
              <button class="button primary" style="margin-top: 10px">+ Add staff</button>
            </section>

            <section class="mobile-card">
              <strong>Working hours (selected staff)</strong>
              <div class="form-grid" style="margin-top: 8px">
                <div class="form-grid two">
                  <input class="input" value="Mon-Fri 09:00" />
                  <input class="input" value="Mon-Fri 18:00" />
                </div>
                <div class="form-grid two">
                  <input class="input" value="Sat 10:00" />
                  <input class="input" value="Sat 15:00" />
                </div>
                <input class="input" value="Time-off: 01 Mar - 07 Mar" />
                <button class="button secondary">Save schedule</button>
              </div>
            </section>
          </main>

          <nav class="mobile-nav">
            <a class="mobile-nav-item" href="./crm-mobile-dashboard.html">Today</a>
            <a class="mobile-nav-item" href="./crm-mobile-calendar.html">Calendar</a>
            <a class="mobile-nav-item" href="./crm-mobile-clients.html">Clients</a>
            <a class="mobile-nav-item active" href="./crm-mobile-staff-schedule.html">Staff</a>
          </nav>
        </div>
      </div>
    </div>
  </body>
</html>
