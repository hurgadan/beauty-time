<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRM Mobile Appointments</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="prototype-shell">
      <header class="prototype-header">
        <div>
          <span class="badge">Mobile CRM · Screen 4</span>
          <h1 style="margin-top: 8px">Appointments</h1>
        </div>
        <a class="button secondary" href="./crm-mobile-prototype.html" style="text-decoration: none">Mobile index</a>
      </header>

      <div class="mobile-wrap">
        <div class="mobile-screen">
          <header class="mobile-topbar">
            <p class="mini">Appointments</p>
            <h2 style="font-size: 24px; margin-top: 4px">Create / edit / cancel</h2>
          </header>

          <main class="mobile-content">
            <section class="mobile-card">
              <strong>New appointment</strong>
              <div class="form-grid" style="margin-top: 8px">
                <input class="input" value="Sofia Ludwig" />
                <select class="select"><option>Pedicure Classic (45m)</option></select>
                <div class="form-grid two">
                  <input class="input" value="27 Feb" />
                  <input class="input" value="11:00" />
                </div>
                <select class="select"><option>booked</option><option>confirmed_by_reminder</option><option>cancelled_by_client</option></select>
                <button class="button primary">Save</button>
              </div>
            </section>

            <section class="mobile-card">
              <strong>Actions</strong>
              <div style="display:flex; gap: 8px; margin-top: 8px">
                <button class="button secondary" style="padding: 10px 12px">Reschedule</button>
                <button class="button ghost" style="padding: 10px 12px">Cancel with reason</button>
              </div>
            </section>
          </main>

          <nav class="mobile-nav">
            <a class="mobile-nav-item" href="./crm-mobile-dashboard.html">Today</a>
            <a class="mobile-nav-item" href="./crm-mobile-calendar.html">Calendar</a>
            <a class="mobile-nav-item active" href="./crm-mobile-appointments.html">Book</a>
            <a class="mobile-nav-item" href="./crm-mobile-settings.html">More</a>
          </nav>
        </div>
      </div>
    </div>
  </body>
</html>
