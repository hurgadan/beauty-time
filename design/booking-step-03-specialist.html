<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Booking Step 3 - Specialist</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <section class="booking-layout">
      <main>
        <section class="card booking-form" style="margin-top: 0">
          <span class="badge">Step 3/8</span>
          <h2 style="font-size: 30px; margin-top: 8px">Choose specialist</h2>
          <p class="muted" style="margin-top: 4px">You can also book with any available specialist.</p>
          <div class="chip-row" style="margin-top: 14px">
            <span class="chip active">Any available</span>
            <span class="chip">Anna (Nails)</span>
            <span class="chip">Mila (Hair)</span>
          </div>
          <div class="state-block success">Fastest option selected: Any available (higher chance for earlier slots).</div>
          <div style="display:flex; gap:10px; margin-top:16px">
            <a class="button secondary" href="./booking-step-02-service.html" style="text-decoration:none">Back</a>
            <a class="button primary" href="./booking-step-04-datetime.html" style="text-decoration:none">Continue</a>
          </div>
        </section>
      </main>
      <aside class="phone-mock">
        <div class="phone-screen">
          <header class="phone-top"><h3 style="font-size:22px">Specialist</h3></header>
          <section class="phone-section"><p class="mini">Any available specialist selected.</p></section>
        </div>
      </aside>
    </section>
  </body>
</html>
