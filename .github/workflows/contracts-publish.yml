name: Contracts Publish

on:
  workflow_dispatch:
  push:
    tags:
      - 'contracts-v*'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@beauty-time'
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install API dependencies
        run: npm install

      - name: Build Public contracts package
        run: npm run contracts:build:public

      - name: Build CRM contracts package
        run: npm run contracts:build:crm

      - name: Publish Public contracts package
        run: npm publish --access public
        working-directory: api/src/contracts/public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish CRM contracts package
        run: npm publish --access public
        working-directory: api/src/contracts/crm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
