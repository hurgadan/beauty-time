name: API CI

on:
  push:
    paths:
      - 'api/**'
      - '.github/workflows/api-ci.yml'
      - '.github/scripts/**'
  pull_request:
    paths:
      - 'api/**'
      - '.github/workflows/api-ci.yml'
      - '.github/scripts/**'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

      - name: E2E Smoke
        if: ${{ hashFiles('api/docker-compose.e2e.yml', 'api/test/e2e/config/jest-e2e.json') != '' }}
        run: npm run test:e2e

  contracts-build:
    runs-on: ubuntu-latest
    needs: quality
    defaults:
      run:
        working-directory: api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install
        run: npm install

      - name: Build Public Contracts Package
        run: npm run contracts:build:public

      - name: Build CRM Contracts Package
        run: npm run contracts:build:crm

  contracts-publish:
    runs-on: ubuntu-latest
    needs: contracts-build
    if: >-
      ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' &&
      startsWith(github.event.head_commit.message, 'chore: bump contracts version to ') == false }}
    defaults:
      run:
        working-directory: api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@hurgadan'
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Bump contracts version
        run: ./.github/scripts/bump-contracts-version.sh
        working-directory: .

      - name: Install
        run: npm install

      - name: Build Public Contracts Package
        run: npm run contracts:build:public

      - name: Build CRM Contracts Package
        run: npm run contracts:build:crm

      - name: Publish Public Contracts Package
        run: npm publish --access public
        working-directory: api/src/contracts/public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish CRM Contracts Package
        run: npm publish --access public
        working-directory: api/src/contracts/crm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
